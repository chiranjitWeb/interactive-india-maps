<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Locator - India</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .wrapper {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .header p {
            color: #6b7280;
            font-size: 16px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 24px;
        }

        .map-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        #map {
            width: 100%;
            height: 600px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .search-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .search-box h3 {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .filter-group {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .filter-group h3 {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: background 0.2s ease;
        }

        .filter-option:hover {
            background: #f3f4f6;
        }

        .filter-option input[type="checkbox"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .filter-option label {
            cursor: pointer;
            flex: 1;
            font-size: 14px;
            color: #374151;
        }

        .results-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            flex: 1;
            overflow-y: auto;
            max-height: 550px;
        }

        .results-box h3 {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .store-item {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid #e5e7eb;
            transition: all 0.2s ease;
        }

        .store-item:hover {
            border-color: #667eea;
            background: #f9fafb;
            transform: translateX(4px);
        }

        .store-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .store-item h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .store-type {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 3px;
            background: #f3f4f6;
            color: #6b7280;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .store-item.active .store-type {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .store-item p {
            font-size: 12px;
            line-height: 1.5;
            opacity: 0.8;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #9ca3af;
        }

        .details-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            display: none;
        }

        .details-card.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .details-card h2 {
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 16px;
        }

        .detail-item {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e5e7eb;
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 14px;
            color: #1f2937;
            font-weight: 500;
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            #map {
                height: 400px;
            }

            .sidebar {
                flex-direction: row;
                gap: 12px;
            }

            .search-box,
            .filter-group,
            .results-box {
                flex: 1;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                flex-direction: column;
            }

            .search-box,
            .filter-group,
            .results-box {
                flex: none;
            }

            #map {
                height: 300px;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <!-- Header -->
        <div class="header">
            <h1>🏪 Store Locator</h1>
            <p>Find our stores across India and get directions instantly</p>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Map -->
            <div class="map-container">
                <div id="map"></div>
            </div>

            <!-- Sidebar -->
            <div class="sidebar">
                <!-- Search -->
                <div class="search-box">
                    <h3>Search</h3>
                    <input 
                        type="text" 
                        class="search-input" 
                        id="searchInput" 
                        placeholder="Search by store name..."
                    >
                </div>

                <!-- Filter -->
                <div class="filter-group">
                    <h3>Filter by Type</h3>
                    <div class="filter-options">
                        <div class="filter-option">
                            <input type="checkbox" id="typeAll" checked>
                            <label for="typeAll">All Types</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="typeFlagship" checked>
                            <label for="typeFlagship">Flagship</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="typeExpress" checked>
                            <label for="typeExpress">Express</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="typePartner" checked>
                            <label for="typePartner">Partner</label>
                        </div>
                    </div>
                </div>

                <!-- Results -->
                <div class="results-box">
                    <h3>Results</h3>
                    <div id="results"></div>
                </div>
            </div>
        </div>

        <!-- Details Card -->
        <div class="details-card" id="detailsCard">
            <h2 id="detailsTitle"></h2>
            <div id="detailsContent"></div>
            <button class="action-btn" id="directionsBtn">Get Directions</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <script>
        // =====================================================================
        // DATA
        // =====================================================================
        
        const stores = [
            {
                id: 1,
                name: 'Ahmedabad Flagship',
                type: 'Flagship',
                lat: 23.0225,
                lng: 72.5714,
                address: 'Satellite Rd, Ahmedabad, Gujarat',
                phone: '+91 79 7777 7777',
                hours: 'Mon-Sun: 10 AM - 9 PM',
                rating: 4.8,
                reviews: 342,
                color: '#667eea'
            },
            {
                id: 2,
                name: 'Delhi Premium',
                type: 'Flagship',
                lat: 28.6139,
                lng: 77.2090,
                address: 'Connaught Place, New Delhi',
                phone: '+91 11 4444 4444',
                hours: 'Mon-Sun: 10 AM - 10 PM',
                rating: 4.9,
                reviews: 521,
                color: '#667eea'
            },
            {
                id: 3,
                name: 'Mumbai Express',
                type: 'Express',
                lat: 19.0760,
                lng: 72.8777,
                address: 'Lower Parel, Mumbai, Maharashtra',
                phone: '+91 22 5555 5555',
                hours: 'Mon-Sun: 11 AM - 9 PM',
                rating: 4.6,
                reviews: 298,
                color: '#764ba2'
            },
            {
                id: 4,
                name: 'Bangalore Central',
                type: 'Flagship',
                lat: 12.9716,
                lng: 77.5946,
                address: 'Indiranagar, Bangalore, Karnataka',
                phone: '+91 80 6666 6666',
                hours: 'Mon-Sun: 10 AM - 8 PM',
                rating: 4.7,
                reviews: 187,
                color: '#667eea'
            },
            {
                id: 5,
                name: 'Chennai Partner Hub',
                type: 'Partner',
                lat: 13.0827,
                lng: 80.2707,
                address: 'Anna Nagar, Chennai, Tamil Nadu',
                phone: '+91 44 3333 3333',
                hours: 'Mon-Sun: 10 AM - 9 PM',
                rating: 4.5,
                reviews: 156,
                color: '#a78bfa'
            },
            {
                id: 6,
                name: 'Kolkata Express',
                type: 'Express',
                lat: 22.5726,
                lng: 88.3639,
                address: 'Alipore, Kolkata, West Bengal',
                phone: '+91 33 2222 2222',
                hours: 'Mon-Sun: 10 AM - 7 PM',
                rating: 4.4,
                reviews: 143,
                color: '#764ba2'
            },
            {
                id: 7,
                name: 'Hyderabad Express',
                type: 'Express',
                lat: 17.3850,
                lng: 78.4867,
                address: 'Banjara Hills, Hyderabad, Telangana',
                phone: '+91 40 1111 1111',
                hours: 'Mon-Sun: 10 AM - 8 PM',
                rating: 4.6,
                reviews: 201,
                color: '#764ba2'
            }
        ];

        // =====================================================================
        // STATE
        // =====================================================================
        
        let map = null;
        let markers = {};
        let selectedStoreId = null;
        let filteredStores = [...stores];

        // =====================================================================
        // INIT
        // =====================================================================
        
        function init() {
            initMap();
            renderStores();
            setupEventListeners();
        }

        function initMap() {
            map = L.map('map').setView([20.5937, 78.9629], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);
            map.options.zoomAnimation = false;

            renderMarkers();
        }

        // =====================================================================
        // MARKERS
        // =====================================================================
        
        function renderMarkers() {
            Object.values(markers).forEach(m => {
                if (map.hasLayer(m)) map.removeLayer(m);
            });
            markers = {};

            filteredStores.forEach(store => {
                const isActive = store.id === selectedStoreId;
                const icon = L.divIcon({
                    html: `
                        <div style="
                            width: 32px;
                            height: 32px;
                            background-color: ${store.color};
                            border-radius: 50%;
                            border: 3px solid white;
                            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            transform: scale(${isActive ? 1.3 : 1});
                            transition: transform 0.2s ease;
                        ">
                            <div style="width: 8px; height: 8px; background: white; border-radius: 50%;"></div>
                        </div>
                    `,
                    iconSize: [32, 32],
                    iconAnchor: [16, 16]
                });

                const marker = L.marker([store.lat, store.lng], { icon })
                    .bindPopup(`<strong>${store.name}</strong><br>${store.type}`)
                    .addTo(map);

                marker.on('click', () => selectStore(store.id));
                markers[store.id] = marker;
            });
        }

        // =====================================================================
        // STORE SELECTION
        // =====================================================================
        
        function selectStore(storeId) {
            selectedStoreId = storeId;
            const store = stores.find(s => s.id === storeId);

            if (store) {
                smoothZoomTo(store.lat, store.lng, 9);
                showDetails(store);
                renderStores();
                renderMarkers();
                if (markers[storeId]) markers[storeId].openPopup();
            }
        }

        // =====================================================================
        // SMOOTH ZOOM
        // =====================================================================
        
        function easeOutQuart(t) {
            return 1 - Math.pow(1 - t, 4);
        }

        function smoothZoomTo(lat, lng, zoom) {
            const startZoom = map.getZoom();
            const startCenter = map.getCenter();
            const startTime = Date.now();
            const duration = 600;

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = easeOutQuart(progress);

                const currentZoom = startZoom + (zoom - startZoom) * ease;
                const currentLat = startCenter.lat + (lat - startCenter.lat) * ease;
                const currentLng = startCenter.lng + (lng - startCenter.lng) * ease;

                map.setView([currentLat, currentLng], currentZoom, { animate: false });

                if (progress < 1) {
                    requestAnimationFrame(animate);
                }
            }

            animate();
        }

        // =====================================================================
        // DETAILS
        // =====================================================================
        
        function showDetails(store) {
            const card = document.getElementById('detailsCard');
            const title = document.getElementById('detailsTitle');
            const content = document.getElementById('detailsContent');
            const btn = document.getElementById('directionsBtn');

            title.textContent = store.name;
            content.innerHTML = `
                <div class="detail-item">
                    <div class="detail-label">Type</div>
                    <div class="detail-value">${store.type}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Address</div>
                    <div class="detail-value">${store.address}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Phone</div>
                    <div class="detail-value"><a href="tel:${store.phone.replace(/[^\d+]/g, '')}" style="color: inherit;">${store.phone}</a></div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Hours</div>
                    <div class="detail-value">${store.hours}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Rating</div>
                    <div class="detail-value">⭐ ${store.rating} (${store.reviews} reviews)</div>
                </div>
            `;

            btn.onclick = () => {
                window.open(`https://maps.google.com/?q=${store.lat},${store.lng}`);
            };

            card.classList.add('show');
        }

        // =====================================================================
        // RENDERING
        // =====================================================================
        
        function renderStores() {
            const results = document.getElementById('results');

            if (filteredStores.length === 0) {
                results.innerHTML = '<div class="no-results">No stores found</div>';
                return;
            }

            results.innerHTML = filteredStores.map(store => `
                <div class="store-item ${selectedStoreId === store.id ? 'active' : ''}" 
                     onclick="selectStore(${store.id})">
                    <span class="store-type">${store.type}</span>
                    <h4>${store.name}</h4>
                    <p>⭐ ${store.rating} • ${store.reviews} reviews</p>
                </div>
            `).join('');
        }

        // =====================================================================
        // FILTERING & SEARCH
        // =====================================================================
        
        function setupEventListeners() {
            // Search
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                applyFilters(query);
            });

            // Filter checkboxes
            document.getElementById('typeAll').addEventListener('change', (e) => {
                const isChecked = e.target.checked;
                ['typeFlagship', 'typeExpress', 'typePartner'].forEach(id => {
                    document.getElementById(id).checked = isChecked;
                });
                applyFilters();
            });

            ['typeFlagship', 'typeExpress', 'typePartner'].forEach(id => {
                document.getElementById(id).addEventListener('change', applyFilters);
            });
        }

        function applyFilters(searchQuery = '') {
            const selectedTypes = [];
            if (document.getElementById('typeFlagship').checked) selectedTypes.push('Flagship');
            if (document.getElementById('typeExpress').checked) selectedTypes.push('Express');
            if (document.getElementById('typePartner').checked) selectedTypes.push('Partner');

            filteredStores = stores.filter(store => {
                const matchType = selectedTypes.includes(store.type);
                const matchSearch = store.name.toLowerCase().includes(searchQuery);
                return matchType && matchSearch;
            });

            selectedStoreId = null;
            document.getElementById('detailsCard').classList.remove('show');
            renderStores();
            renderMarkers();
        }

        // =====================================================================
        // START
        // =====================================================================
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
