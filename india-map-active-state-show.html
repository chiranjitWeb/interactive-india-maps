<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map of India - Interactive</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f5f4;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .map-wrapper {
    width: 100%;
    max-width: 620px;
    padding: 24px;
    text-align: center;
    position: relative;
  }
  h1 {
    color: #2b2b2b;
    margin-bottom: 4px;
  }
  .hint {
    color: #8a8a8a;
    font-size: 14px;
    margin-bottom: 12px;
  }
  .map-wrapper svg {
    width: 100%;
    height: auto;
    display: block;
    overflow: visible;
  }

  /* Only the actual state/UT shapes are interactive */
  .map-wrapper svg path.state {
    cursor: pointer;
    transition: fill 0.15s ease, filter 0.15s ease;
  }
  .map-wrapper svg path.state:hover,
  .map-wrapper svg path.state.active {
    fill: #2f7dd1 !important;
    filter: drop-shadow(0 0 3px rgba(0,0,0,0.35));
  }

  /* Text labels / legend dot stay non-interactive */
  .map-wrapper svg path.label-text {
    pointer-events: none;
  }

  #tooltip {
    position: fixed;
    pointer-events: none;
    background: #1f2937;
    color: #fff;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    opacity: 0;
    transform: translate(-50%, -130%);
    transition: opacity 0.1s ease;
    z-index: 10;
  }
  #tooltip.visible {
    opacity: 1;
  }
</style>
</head>

  <div id="tooltip"></div>
<script>
  
// Active states (later from backend)
const activeStates = [
    'west-bengal',
    'maharashtra',
    'uttar-pradesh',
];

const states = document.querySelectorAll('svg path.state');
const tooltip = document.getElementById('tooltip');

// Apply active class
activeStates.forEach(id => {
    const state = document.querySelector(`svg path.state[data-id="${id}"]`);
    if (state) {
        state.classList.add('active');
    }
});

states.forEach(state => {

    // Tooltip
    state.addEventListener('mousemove', function (e) {
        tooltip.textContent = this.dataset.state;
        tooltip.style.left = (e.clientX + 15) + 'px';
        tooltip.style.top = (e.clientY + 15) + 'px';
        tooltip.classList.add('show');
    });

    state.addEventListener('mouseleave', function () {
        tooltip.classList.remove('show');
    });

    // Click only active states
    // state.addEventListener('click', function (e) {
       

    //     if (!this.classList.contains('active')) {
          
    //         e.preventDefault();
    //         return;
    //     }

    //     console.log(this.dataset.id);
    //     console.log(this.dataset.state);

    //     // Future
    //     // window.location.href = "/state/" + this.dataset.id;
    // });

       state.addEventListener('click', function (e) {

        if (!this.classList.contains('active')) {
            e.preventDefault();
            return;
        }

        const stateId = this.dataset.id;

        // Select the dropdown value
        const select = document.getElementById('state-select');
        select.value = stateId;

        // Trigger change event
        select.dispatchEvent(new Event('change'));

    });

});

document.getElementById('state-select').addEventListener('change', function () {

    const selected = this.value;

    document.querySelectorAll('svg path.state').forEach(state => {
        state.classList.remove('selected');
    });

    const mapState = document.querySelector(`svg path.state[data-id="${selected}"]`);

    if (mapState) {
        mapState.classList.add('selected');
    }

});
  </script>
  <style>
svg path.state {
    fill: #cfcfcf;
    cursor: default;
    transition: fill .3s ease;
}

svg path.state.active {
    fill: #28a745;
    cursor: pointer;
}

svg path.state.active:hover {
    fill: #218838;
}

/* Tooltip */
#tooltip {
    position: fixed;
    background: #222;
    color: #fff;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 13px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    visibility: hidden;
    transition: opacity .2s;
    z-index: 9999;
}

#tooltip.show {
    opacity: 1;
    visibility: visible;
}


  </style>
